<body>

    <!-- ===========================
         INTRO
    ============================ -->

    <div id="intro">

        <div id="led"></div>

        <div id="terminal">

            <h1>CASE FILES</h1>

            <div id="status"></div>

            <div id="scanner"></div>

        </div>

    </div>



    <!-- ===========================
         TRANSFORMATION
    ============================ -->

    <div id="transform">

        <div id="monitor">

            <div id="monitor-frame">

                <div id="crt">

                    <!-- CRT Effects -->

                    <div id="scanlines"></div>

                    <div id="noise"></div>

                    <div id="flicker"></div>

                    <div id="reflection"></div>



                    <!-- CRT Corners -->

                    <div class="corner"></div>
                    <div class="corner"></div>
                    <div class="corner"></div>
                    <div class="corner"></div>



                    <!-- Chief -->

                    <div id="chief">

                        <img
                            id="chiefSprite"
                            src="assets/images/chief.png"
                            alt="Chief">

                    </div>



                    <!-- Evidence Projection -->

                    <div id="projection">

                        <img
                            id="evidenceImage"
                            src=""
                            alt="Evidence">

                    </div>



                    <!-- Dialogue -->

                    <div id="chiefDialogue">

                        <div id="speaker">

                            THE CHIEF

                        </div>

                        <div id="subtitle"></div>

                    </div>

                </div>

            </div>

        </div>

    </div>



    <!-- Scripts -->

    <script src="js/audio.js"></script>
    <script src="js/intro.js"></script>

</body>
